plugins {
    id 'fabric-loom' version '1.16.2' // Upgraded Loom version for newer releases
    id 'maven-publish'
}

version = "1.0.0"
group = "com.tiny"

repositories {
    maven { url = "https://maven.fabricmc.net/" }
    mavenCentral()
}

// Forces Gradle to use a dedicated Java 21 toolchain to decouple from your system's Java 26
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(21)
    }
}

dependencies {
    minecraft "com.mojang:minecraft:1.21.11"
    mappings "net.fabricmc:yarn:1.21.11+build.6:v2"
    modImplementation "net.fabricmc:fabric-loader:0.16.10"
    modImplementation "net.fabricmc.fabric-api:fabric-api:0.141.4+1.21.11" // Correct Fabric API mapping for 1.21.11
}

processResources {
    inputs.property "version", project.version
    filteringCharset "UTF-8"

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}